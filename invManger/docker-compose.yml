# Inventory Manager — full stack (Postgres + Express API + React/nginx)
# Usage:  cp .env.example .env  &&  docker compose up --build
# Then open http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    container_name: invmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invpass}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invuser} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: invmanager-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-invuser}:${POSTGRES_PASSWORD:-invpass}@db:5432/${POSTGRES_DB:-inventory}?schema=public
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@inventory.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: invmanager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
